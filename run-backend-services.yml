version: "3.9"


x-backend-app-environment: &x-backend-app-environment
  LOG_LEVEL: "DEBUG"
  VERSION: "0.1.0"


services:
  backend-app:
    platform: linux/amd64
    build:
      context: .
      args:
        APP_DIR: django
    volumes:
      - ./django:/app
    environment:
      <<: *x-backend-app-environment
    env_file:
      - .env
    command: [ "/wait-for-it.sh", "db:5432", "--", "/start.sh" ]
    ports:
      - "8000:8000"
    depends_on:
      - db
      - keydb
    networks:
      app_network:
        aliases:
          - backend-app.lvh.me

  fastapi-app:
    platform: linux/amd64
    build:
      context: .
      args:
        APP_DIR: fastapi
    volumes:
      - ./fastapi:/app
    environment:
      <<: *x-backend-app-environment
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload" ]
    ports:
      - "8001:8001"
    networks:
      app_network:
        aliases:
          - fastapi-app.lvh.me


networks:
  app_network:
    external: false
